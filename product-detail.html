<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iStore | Produktdetaljer</title>
    <link rel="stylesheet" href="Assets/style.css">
    <style>
        /* Ajustes específicos para manter o look Apple nesta página */
        .detail-wrapper { padding: 60px 0; }
        .back-btn { 
            display: inline-flex; align-items: center; gap: 8px;
            text-decoration: none; color: var(--apple-gray);
            font-weight: 500; margin-bottom: 40px; transition: 0.3s;
        }
        .back-btn:hover { color: var(--apple-blue); transform: translateX(-5px); }
        
        /* Grid de Detalhes Estilo Apple */
        .detail-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 60px; align-items: center; 
        }
        .detail-image-box {
            background: var(--apple-card); border-radius: 30px;
            padding: 50px; text-align: center;
        }
        .detail-image-box img { max-width: 100%; height: auto; object-fit: contain; }
        
        .detail-info h1 { font-size: 3rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 10px; }
        .detail-price { font-size: 2rem; color: var(--apple-black); font-weight: 600; margin-bottom: 30px; }
        
        @media (max-width: 768px) {
            .detail-grid { grid-template-columns: 1fr; gap: 30px; }
            .detail-info { text-align: center; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="container header-grid">
            <a href="index.html" class="logo">iStore</a>
            <nav class="main-nav">
                <a href="index.html">Forside</a>
                <a href="products.html">Produkter</a>
                <a href="about.html">Om os</a>
            </nav>
        </div>
    </header>

    <main class="container detail-wrapper">
        <a href="products.html" class="back-btn">
            <span>←</span> Tilbage til produkter
        </a>

        <div id="product-detail-render">
            <div class="detail-grid">
                <div class="detail-image-box">
                    <div class="loader">Henter oplysninger...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="apple-footer">
        <div class="container">
            <p>&copy; 2026 iStore Danmark. Professionel Apple support.</p>
        </div>
    </footer>

    <script src="Assets/script.js"></script>
    <script>
        // Esta função deve estar no teu script.js para pegar o ID da URL
        // e mostrar o produto certo nesta página.
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initProductDetail === 'function') {
                initProductDetail();
            }
        });
    </script>
</body>
</html>
