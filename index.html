<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billigt Filament | Kvalitet til 3D Print</title>
    <link rel="stylesheet" href="Assets/style.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-grid">
            <a href="index.html" class="logo">BILLIGT<span>FILAMENT</span></a>
            
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>

            <nav class="main-nav" id="main-nav">
                <a href="index.html" class="active">Forside</a>
                <a href="products.html">Produkter</a>
                <a href="about.html">Om os</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="home-hero-new">
            <div class="container hero-grid-new">
                <div class="hero-text-new">
                    <h1>Filament til de bedste priser</h1>
                    <p>Stort udvalg af 3D print materialer. Vi leverer direkte fra lager med dag-til-dag levering.</p>
                    <a href="products.html" class="btn-buy" style="display:inline-block; width:auto; padding:18px 40px; border-radius: 50px;">
                        Se sortimentet
                    </a>
                </div>

                <div class="hero-products-new">
                    <div id="hero-random-printer" class="hero-card-1"></div>
                    <div id="hero-random-material" class="hero-card-2"></div>
                </div>
            </div>
        </section>

        <section class="container" style="padding: 80px 0;">
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px;">
                <div>
                    <h2 style="font-size: 2.2rem; letter-spacing: -1.5px;">Udvalgte Produkter</h2>
                    <p style="color: var(--slate);">Vores mest populære valg lige nu</p>
                </div>
                <a href="products.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Se alle →</a>
            </div>

            <div id="productGrid" class="product-grid">
                </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Billigt Filament ApS.</p>
        </div>
    </footer>

    <script src="Assets/script.js"></script>
</body>
</html>
